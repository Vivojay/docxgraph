<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExperienceGraph</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <header>
      <div class="logo">ExperienceGraph</div>
      {% if user %}
      <div>Signed in as {{ user.email }}</div>
      {% endif %}
    </header>
    <div class="container">
      <div class="notice">
        Clinician-only, de-identified. Not medical advice. No patient identifiers allowed.
      </div>
      {% block content %}{% endblock %}
    </div>
    <script src="/static/js/app.js"></script>
  </body>
</html>
