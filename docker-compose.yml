version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://eg_user:eg_pass@db:5432/experiencegraph}
      - SECRET_KEY=${SECRET_KEY:-change-me}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-auto}
      - FRONTEND_ORIGINS=${FRONTEND_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - BOOTSTRAP_SCHEMA=${BOOTSTRAP_SCHEMA:-true}
    volumes:
      - .:/app
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: eg_user
      POSTGRES_PASSWORD: eg_pass
      POSTGRES_DB: experiencegraph
    ports:
      - "5432:5432"
